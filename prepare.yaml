# Want to also support a "command:" so that base can be built out of a command
# Then the first layer of the container will be a hash
base: debian-12

steps:
  - RUN: |
      apt-get update
      apt-get install -y nginx curl

  - RUN: |
      echo "Hello from fastcontainer layer 2" > /etc/motd

  - RUN: |
      # Multi-line scripts work perfectly
      systemctl enable nginx
