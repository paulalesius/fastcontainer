# Based on Ubuntu Noble 24.04
base:
  name: ubuntu-custom
  create: |
    debootstrap --variant=minbase noble . http://archive.ubuntu.com/ubuntu/
    chroot . echo "test command inside chroot"

profiles:
  default:
    nspawn:
      - "systemd-nspawn"
      - "-D"
      - "{{ROOT}}"
      - "--tmpfs=/var/tmp"
      - "--private-users=no"
      - "--resolv-conf=replace-stub"
      - "--timezone=off"

steps:
  - RUN: |
      apt-get update
      apt-get -y upgrade

  - RUN: |
      apt-get -y install wget

  - RUN: |
      # Download once so we have it cached in a layer
      wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb

  - RUN: |
      # Install CUDA 13.2
      echo "$(id) $(pwd)"
      dpkg -i cuda-keyring_1.1-1_all.deb
      apt-get update
      apt-get -y install cuda-toolkit

  - RUN: |
      # Multi-line scripts work perfectly
      # systemctl doesn't work in nspawn → enable nginx manually (standard container pattern)
      mkdir -p /etc/systemd/system/multi-user.target.wants
      ln -sf /lib/systemd/system/nginx.service /etc/systemd/system/multi-user.target.wants/nginx.service

